  <!-- CONTENIDO -->
  <div class="container py-4">

    <h1>🎮 Biblioteca Steam</h1>

    <!-- CONTENEDOR -->
    <div id="contenedor"></div>

  </div>

  <script>
    let datos = [];
    let favoritos = JSON.parse(localStorage.getItem("favoritos")) || [];

    fetch("../data/steam.json")
      .then(res => res.json())
      .then(data => {
        datos = data;
        renderPorLetras(data);
      })
      .catch(error => console.error("ERROR:", error));

    function agruparPorLetra(lista) {
      let grupos = {};

      lista.forEach(j => {
        let letra = j.nombre.charAt(0).toUpperCase();
        if (!/[A-Z]/.test(letra)) letra = "#";

        if (!grupos[letra]) grupos[letra] = [];
        grupos[letra].push(j);
      });

      return grupos;
    }

    function renderPorLetras(lista) {
      let cont = document.getElementById("contenedor");
      cont.innerHTML = "";

      let grupos = agruparPorLetra(lista);

      Object.keys(grupos).sort().forEach(letra => {

        cont.innerHTML += `<h2 id="letra-${letra}">${letra}</h2><div class="row">`;

        grupos[letra].forEach(j => {

          let esFav = j.favorito;
          let progreso = calcularProgreso(j.logros);

          cont.innerHTML += `
        <div class="col-md-4 mb-4">
          <div class="card card-game">

            <img src="${j.imagen}" class="game-img">

            <div class="p-3">

              <div class="d-flex justify-content-between">
                <h5>Nombre: ${j.nombre}</h5>
                <span class="fav">
                  ${j.favorito ? "⭐" : "☆"}
                </span>
              </div>

              <p>Franquicia: ${j.franchise}</p>
              <p>Info: ${j.info}</p>
              <p>Fecha: ${j.fecha}</p>
              <p>Numero de videos: ${j.numVideos}</p>
              <p>Archivo :<a target="_blank" href="${j.linkYT}" class="btn btn-sm btn-light"> Link Youtube <i class="fa-brands fa-youtube"></i></a></p> 
              <p>Estado: ${j.estado}</p>
              <p>Calificación: ⭐ ${j.calificacion} ⭐</p>
              <p>Logros: ${j.numLogros}</p>

              <div class="progress mb-2">
                <div class="progress-bar" style="width:${progreso}%">${progreso}%</div>
              </div>

              

              <a href="${j.archivo}" class="btn btn-sm btn-light">Ver tienda steam</a>

            </div>
          </div>
        </div>
      `;
        });

        cont.innerHTML += `</div>`;
      });
    }

    function buscar() {
      let texto = document.getElementById("buscador").value.toLowerCase();
      let filtrados = datos.filter(j => j.nombre.toLowerCase().includes(texto));
      renderPorLetras(filtrados);
    }

    function calcularProgreso(logros) {
      if (!logros.includes("/")) return 0;
      let [a, b] = logros.split("/");
      return Math.round((a / b) * 100);
    }

    function toggleFav(id) {
      if (favoritos.includes(id)) {
        favoritos = favoritos.filter(f => f !== id);
      } else {
        favoritos.push(id);
      }

      localStorage.setItem("favoritos", JSON.stringify(favoritos));
      renderPorLetras(datos);
    }
  </script>

</body>
