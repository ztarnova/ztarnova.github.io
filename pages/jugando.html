<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ztar</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Tu CSS -->
  <link rel="stylesheet" href="../css/style.css">
  
  <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand text-white" href="../index.html">ztar 🎮</a>
      <button class="navbar-toggler bg-light" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="../index.html"><i class="fa-solid fa-house"></i> Inicio</a></li>
          <li class="nav-item"><a class="nav-link" href="./jugando.html"><i class="fa-solid fa-clock"></i> Jugando actualmente</a></li>
          <li class="nav-item"><a class="nav-link" href="./steam.html"><i class="fa-brands fa-steam"></i> Steam</a></li>
          <li class="nav-item"><a class="nav-link" href="./ra.html"><i class="fa-solid fa-gamepad"></i> RetroAchievements</a></li>
          <li class="nav-item"><a class="nav-link" href="./blizzard.html"><i class="fa-brands fa-battle-net"></i> Blizzard</a></li>
          <li class="nav-item"><a class="nav-link" href="./fanGames.html"><i class="fa-sharp fa-solid fa-heart"></i> Fan Games</a></li>
          <li class="nav-item"><a class="nav-link" href="./swmCentral.html"><i class="fa-sharp fa-solid fa-heart"></i> SMW Central</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Sección Inicio -->
  <section id="inicio" class="container py-5">
    <h1>Bienvenido a mi lista de juegos 🎮</h1>
    <p>Lista de juegos en progreso.</p>
  </section>

  <!-- Sección Jugando actualmente -->
  <section id="jugando" class="container py-5">
    <h2>Jugando actualmente</h2>
    <div class="table-responsive">
      <table class="table table-dark table-striped table-bordered text-center align-middle">
        <thead>
          <tr>
            <th>Título</th>
            <th>Plataforma</th>
            <th>Tiempo jugando</th>
            <th>Logros</th>
            <th>Archivo</th>
          </tr>
        </thead>
        <tbody id="tabla-juegos">
          <!-- Se llena con JSON -->
        </tbody>
      </table>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center text-light py-3">
    <p>ztar</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Script para llenar la tabla desde JSON -->
  <script>
    fetch('../data/jugando.json') // Ajusta ruta si es necesario
      .then(response => response.json())
      .then(data => {
        const tabla = document.getElementById('tabla-juegos');

        data.forEach(juego => {
          const fila = document.createElement('tr');

          fila.innerHTML = `
            <td>${juego.titulo}</td>
            <td>${juego.plataforma}</td>
            <td>${juego.tiempo}</td>
            <td>${juego.logros}</td>
            <td>
              <a href="${juego.archivo}" class="btn btn-sm btn-outline-light">
                Ver archivo
              </a>
            </td>
          `;

          tabla.appendChild(fila);
        });
      })
      .catch(error => console.error('Error cargando JSON:', error));
  </script>

</body>
</html>
